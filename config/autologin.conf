# /etc/systemd/system/getty@tty1.service.d/autologin.conf
# Copy to: /etc/systemd/system/getty@tty1.service.d/autologin.conf
# (create the directory first: sudo mkdir -p /etc/systemd/system/getty@tty1.service.d)
#
# WHY this is required:
# kmsdrm needs to become DRM master, which requires a real logind session.
# The speedometer service uses PAMName=login + TTYPath=/dev/tty1, so logind
# creates a seat session on tty1. That session only exists if the user is
# actually logged in on tty1 — autologin makes that happen at boot.
# Without it: cold boot results in a silent black screen (no error, no crash).

[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin stealth --noclear %I $TERM

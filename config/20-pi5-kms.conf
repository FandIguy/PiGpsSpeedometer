# /etc/X11/xorg.conf.d/20-pi5-kms.conf
# Forces X to use card1 (RP1 display controller) on Raspberry Pi 5.
# Copy to: /etc/X11/xorg.conf.d/20-pi5-kms.conf
#
# WHY: Pi 5 exposes two DRM devices:
#   card0 = V3D GPU (render only, no display connectors)
#   card1 = RP1 display controller (HDMI-A-1, HDMI-A-2)
# Without this file, X's modesetting driver defaults to card0 and fails
# to find any display connectors. Result: X starts but nothing appears.
#
# NOT needed for Pi 4 (single DRM device).

Section "Device"
    Identifier "Pi5 RP1 Display"
    Driver     "modesetting"
    Option     "kmsdev" "/dev/dri/card1"
EndSection
